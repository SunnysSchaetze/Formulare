<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html {
      background-color: #ff7f00;
      padding: 10px;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: calc(100vh - 20px);
      background-color: #000;
      color: orange;
      border-radius: 25px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .textbox {
      width: 80%;
      max-width: 800px;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h3 {
      font-size: 18px;
      margin-bottom: 25px;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    li {
      font-size: 1.0em;
      margin-bottom: 15px;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 6px;

      padding: 8px 12px;
      border: 2px solid #ff7f00;
      border-radius: 10px;
      font-size: 0.9em;

      color: #ffcc80;
      text-decoration: none;
      font-weight: bold;

      box-shadow: 0 0 12px rgba(255,127,0,0.45);
      transition: 0.3s ease;
    }

    a:hover {
      color: #ff7f00;
      border-color: #ff9a2f;
      box-shadow: 0 0 22px rgba(255,127,0,0.9);
      transform: scale(1.03);
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .scene {
      position: relative;
      width: 300px;
      height: 300px;
      text-align: center;
    }

    .mailbox {
      font-size: 4rem;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .letter {
      font-size: 2rem;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
    }

    #overlay.active .letter {
      animation: flyToMailbox 1s ease forwards;
      animation-delay: 1.6s;
    }

    @keyframes flyToMailbox {
      0%   { top: 0; opacity: 0; transform: translateX(-50%) scale(0.8); }
      20%  { opacity: 1; }
      100% { top: 220px; opacity: 0; transform: translateX(-50%) scale(1.2); }
    }

    .paper {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: orange;
      opacity: 0;
    }

    #overlay.active .paper {
      animation: showPaper 0.5s forwards;
      animation-delay: 0.2s;
    }

    @keyframes showPaper {
      to { opacity: 1; transform: translateX(-50%) scale(1.05); }
    }

    .stamp {
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%) scale(2);
      opacity: 0;
      color: red;
      font-weight: bold;
    }

    #overlay.active .stamp {
      animation: stamp 0.4s forwards;
      animation-delay: 0.8s;
    }

    @keyframes stamp {
      0% { transform: translateX(-50%) scale(3) rotate(-20deg); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateX(-50%) scale(1) rotate(0deg); opacity: 1; }
    }
  </style>

  <title>Formularübersicht</title>
</head>

<body>

  <div class="textbox">
    <h3>Hier kannst du auf verschiedene Formulare zugreifen:</h3>

    <ul>
      <li>
        <a href="https://sites.google.com/view/sunnysschaetze/home/formulare/kontaktformular" target="_blank">
          📧 Kontaktformular
        </a>
      </li>
      <li>
        <a href="https://sites.google.com/view/sunnysschaetze/home/formulare/widerrufsformular" target="_blank">
          ↩️ Widerrufsformular
        </a>
      </li>
      <li>
        <a href="https://sites.google.com/view/sunnysschaetze/home/formulare/beschwerdeformular" target="_blank">
          💬 Beschwerdeformular
        </a>
      </li>
    </ul>
  </div>

  <div id="overlay">
    <div class="scene">
      <div class="mailbox">📮</div>
      <div class="letter">✉️</div>
      <div class="paper">📄 Formular wird verarbeitet</div>
      <div class="stamp">STEMPEL</div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");

    document.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", function(e) {
        e.preventDefault();

        const url = this.href;

        overlay.classList.add("active");

        setTimeout(() => {
          window.open(url, "_blank");
          overlay.classList.remove("active");
        }, 2000);
      });
    });
  </script>

</body>
</html>
