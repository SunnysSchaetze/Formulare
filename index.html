<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #000000; /* Schwarzer Hintergrund */
      color: orange; /* Orangefarbener Text */
    }

    .textbox {
      background-color: #000000; /* Schwarzer Hintergrund für das Textbox */
      color: orange; /* Orangefarbener Text */
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
      display: flex;
      flex-direction: column;
      justify-content: center; /* Vertikale Zentrierung */
      align-items: center; /* Horizontale Zentrierung */
      height: 300px; /* Höhe für vertikale Zentrierung */
      box-sizing: border-box;
    }

    h3 {
      text-align: center;
      font-size: 24px;
    }

    ul {
      list-style-type: none;
      padding-left: 0;
      text-align: center; /* Zentriert die Liste */
    }

    li {
      font-size: 1.2em;
      margin-bottom: 10px;
    }

    a {
      color: #ffcc80; /* Helles Orange für die Links */
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s; /* Nur Farbänderung beim Hover */
    }

    a:hover {
      color: #cc6600; /* Noch dunkleres Orange für Hover-Effekt */
    }
  </style>
  <title>Formularübersicht</title>
</head>
<body>

  <div class="textbox">
    <h3>Hier kannst du auf verschiedene Formulare zugreifen:</h3>
    <ul>
      <li>📧 <a href="https://forms.gle/wcCUmRbH5c2Ua5g89" target="_blank">Kontaktformular</a></li>
      <li>↩️ <a href="https://forms.gle/o7tG3QsnfdRxK3Mt8" target="_blank">Widerrufsformular</a></li>
      <li>💬 <a href="https://forms.gle/X5hEtRjTN7VfpoKc7" target="_blank">Beschwerdeformular</a></li>
    </ul>
  </div>

</body>
</html>
